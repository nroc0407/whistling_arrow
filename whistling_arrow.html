<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }
#outer {
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  width: 100%; min-height: 100vh;
  padding: 16px 0;
}
#gw { position: relative; overflow: hidden; background: #0a0a1a; border-radius: var(--border-radius-lg); flex-shrink: 0; }
#canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
#ui { position: absolute; top: 12px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
.stat { background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; font-weight: 500; padding: 5px 14px; border-radius: 20px; font-family: var(--font-sans); border: 0.5px solid rgba(255,255,255,0.15); }
#hp-bar-wrap { display: flex; align-items: center; gap: 8px; }
#hp-bar-bg { width: 100px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
#hp-bar { height: 100%; width: 100%; background: #4ade80; border-radius: 4px; transition: width 0.2s, background 0.2s; }
#hp-label { color: #fff; font-size: 12px; font-family: var(--font-sans); opacity: 0.7; }
#msg { position: absolute; top: 45%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 16px; font-weight: 500; font-family: var(--font-sans); text-align: center; line-height: 1.9; text-shadow: 0 1px 6px #000; pointer-events: none; }
#mic-btn { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(229,62,62,0.85); border: none; border-radius: 24px; padding: 9px 28px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); color: #fff; transition: background 0.15s; }
#mic-btn:hover { background: #e53e3e; }
#meters { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
.meter-wrap { width: 10px; height: 70px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden; display: flex; flex-direction: column-reverse; }
.meter-fill { width: 100%; height: 0%; border-radius: 5px; transition: height 0.06s; }
#pitch-fill { background: #4a90d9; }
#vol-fill { background: #6EE7B7; }
.meter-lbl { color: rgba(255,255,255,0.35); font-size: 9px; font-family: var(--font-sans); }
#hz-display { position: absolute; right: 10px; bottom: 14px; color: rgba(255,255,255,0.3); font-size: 10px; font-family: monospace; pointer-events: none; }

/* ── MARK_HZ 슬라이더 ── */
#mark-hz-ctrl {
  width: 100%; max-width: 680px; margin: 10px auto 0;
  padding: 10px 16px 12px;
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  font-family: var(--font-sans);
}
#mark-hz-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
#mark-hz-label { color: rgba(255,255,255,0.55); font-size: 12px; }
#mark-hz-value {
  color: #e53e3e; font-size: 13px; font-weight: 600;
  background: rgba(229,62,62,0.12);
  padding: 2px 10px; border-radius: 20px;
  border: 0.5px solid rgba(229,62,62,0.35);
  min-width: 68px; text-align: center;
  transition: color 0.15s;
}
#mark-hz-track { position: relative; }
#mark-hz-slider {
  width: 100%; height: 4px; cursor: pointer;
  -webkit-appearance: none; appearance: none;
  background: transparent; position: relative; z-index: 2;
}
#mark-hz-fill {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  height: 4px; border-radius: 2px;
  background: linear-gradient(90deg, #4a90d9, #e53e3e);
  pointer-events: none; z-index: 1;
  width: 46%;   /* JS로 갱신 */
}
#mark-hz-slider::-webkit-slider-runnable-track {
  height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.1);
}
#mark-hz-slider::-moz-range-track {
  height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.1);
}
#mark-hz-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; border: 2.5px solid #e53e3e;
  margin-top: -7px; box-shadow: 0 0 6px rgba(229,62,62,0.6);
  transition: box-shadow 0.15s;
}
#mark-hz-slider::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; border: 2.5px solid #e53e3e;
  box-shadow: 0 0 6px rgba(229,62,62,0.6);
}
#mark-hz-slider:active::-webkit-slider-thumb { box-shadow: 0 0 0 5px rgba(229,62,62,0.25); }
#mark-hz-ticks {
  display: flex; justify-content: space-between;
  padding: 4px 2px 0;
  color: rgba(255,255,255,0.25); font-size: 10px;
}
</style>

<div id="outer">
  <div id="gw">
    <canvas id="canvas"></canvas>
    <div id="ui">
      <div class="stat" id="score-box">점수: 0</div>
      <div id="hp-bar-wrap">
        <div id="hp-bar-bg"><div id="hp-bar"></div></div>
        <div id="hp-label">HP 10</div>
      </div>
      <div class="stat" id="kill-box">처치: 0</div>
    </div>
    <div id="meters">
      <div class="meter-lbl">음정</div>
      <div class="meter-wrap"><div class="meter-fill" id="pitch-fill"></div></div>
    </div>
    <div id="hz-display">-- Hz</div>
    <div id="msg">마이크 버튼을 눌러 시작<br><span style="font-size:12px;opacity:0.65">~200Hz 복귀 &nbsp;|&nbsp; 300Hz↑ 호밍 &nbsp;|&nbsp; 무음 둥실</span></div>
    <button id="mic-btn">마이크 켜기</button>
  </div>
</div>

<div id="mark-hz-ctrl">
  <div id="mark-hz-header">
    <span id="mark-hz-label">호밍 전환 음정</span>
    <span id="mark-hz-value">750 Hz</span>
  </div>
  <div id="mark-hz-track">
    <div id="mark-hz-fill"></div>
    <input type="range" id="mark-hz-slider" min="200" max="1400" step="10" value="750">
    <div id="mark-hz-ticks">
      <span>200</span><span>500</span><span>750</span><span>1000</span><span>1400</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const gw = document.getElementById('gw');
const outer = document.getElementById('outer');
let W, H;

function resize() {
  const size = Math.min(outer.offsetWidth, 680);
  gw.style.width = size + 'px';
  gw.style.height = size + 'px';
  W = canvas.width = size;
  H = canvas.height = size;
}
resize();
window.addEventListener('resize', resize);

let audioCtx, analyser, timeDomainBuf, listening = false;
let smoothHz = 0;

let MARK_HZ = 750;


const HOME_R = 36, MAX_HP = 10, MAX_ENEMIES = 3;
let hp = MAX_HP, phase = 'idle';

const HOME = () => ({ x: W/2, y: H-55 });
const arrow = { x:0, y:0, vx:0, vy:-2, angle:-Math.PI/2, trail:[], glow:0, floatT:0 };
const enemies=[], particles=[];
let score=0, kills=0, dmgFlash=0;

function spawnEnemy() {
  if (enemies.filter(e=>!e.hit).length >= MAX_ENEMIES) return;
  const side = Math.floor(Math.random()*3);
  let x, y;
  if (side===0)      { x=W*0.1+Math.random()*W*0.8; y=-40; }
  else if (side===1) { x=-40; y=H*0.05+Math.random()*H*0.6; }
  else               { x=W+40; y=H*0.05+Math.random()*H*0.6; }
  enemies.push({ x, y, r:20+Math.random()*12, alpha:1, hit:false, hitCooldown:0,
    color:`hsl(${Math.random()*360},70%,55%)` });
}
spawnEnemy(); spawnEnemy();

function detectPitch(sr) {
  analyser.getFloatTimeDomainData(timeDomainBuf);
  const buf=timeDomainBuf, n=buf.length;
  let rms=0; for(let i=0;i<n;i++) rms+=buf[i]*buf[i];
  if(Math.sqrt(rms/n)<0.002) return 0;
  const minP=Math.floor(sr/1400), maxP=Math.floor(sr/60);
  let best=-1, bestC=0;
  for(let o=minP;o<=maxP;o++){
    let c=0; for(let i=0;i<n-o;i++) c+=buf[i]*buf[i+o];
    if(c>bestC){bestC=c;best=o;}
  }
  return (best===-1||bestC<0.015)?0:sr/best;
}


function getNearestEnemy() {
  let nearest=null, minD=Infinity;
  for(const e of enemies){
    if(e.hit) continue;
    const d=Math.hypot(e.x-arrow.x,e.y-arrow.y);
    if(d<minD){minD=d;nearest=e;}
  }
  return nearest;
}

function spawnParticles(x,y,color){
  for(let i=0;i<22;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color});
  }
}

function updateHPBar(){
  const bar=document.getElementById('hp-bar');
  bar.style.width=Math.max(0,hp/MAX_HP*100)+'%';
  bar.style.background=hp>6?'#4ade80':hp>3?'#facc15':'#f87171';
  document.getElementById('hp-label').textContent='HP '+Math.max(0,hp);
}

function drawBG(){
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<70;i++){
    ctx.beginPath(); ctx.arc((i*137.5)%W,(i*91.3)%H,0.8,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.2+(i%4)*0.1})`; ctx.fill();
  }
  if(dmgFlash>0){ctx.fillStyle=`rgba(255,0,0,${dmgFlash*0.25})`;ctx.fillRect(0,0,W,H);}
}

function drawHomeZone(t){
  const h=HOME(), pulse=0.5+0.5*Math.sin(t*3);
  const grad=ctx.createRadialGradient(h.x,h.y,0,h.x,h.y,HOME_R);
  grad.addColorStop(0,'rgba(74,222,128,0.22)'); grad.addColorStop(0.6,'rgba(74,222,128,0.12)'); grad.addColorStop(1,'rgba(74,222,128,0)');
  ctx.beginPath(); ctx.arc(h.x,h.y,HOME_R,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.arc(h.x,h.y,HOME_R,0,Math.PI*2);
  ctx.strokeStyle=`rgba(74,222,128,${0.4+pulse*0.3})`; ctx.lineWidth=1.5; ctx.stroke();
}

function drawTarget(e){
  ctx.save(); ctx.globalAlpha=e.alpha;
  const rings=[e.r,e.r*0.68,e.r*0.42,e.r*0.2];
  const colors=['#e53e3e','#fff','#e53e3e','#FFD700'];
  for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(e.x,e.y,rings[i],0,Math.PI*2);ctx.fillStyle=colors[i];ctx.fill();}
  if(e.hitCooldown>0){ctx.beginPath();ctx.arc(e.x,e.y,e.r+4,0,Math.PI*2);ctx.strokeStyle=`rgba(255,255,255,${e.hitCooldown})`;ctx.lineWidth=3;ctx.stroke();}
  ctx.restore();
}

function drawTrail(){
  for(let i=1;i<arrow.trail.length;i++){
    const t=i/arrow.trail.length;
    ctx.beginPath(); ctx.moveTo(arrow.trail[i-1].x,arrow.trail[i-1].y); ctx.lineTo(arrow.trail[i].x,arrow.trail[i].y);
    ctx.strokeStyle=`rgba(255,80,40,${t*0.65})`; ctx.lineWidth=t*4; ctx.lineCap='round'; ctx.stroke();
  }
}

function drawArrow(glow){
  const {x,y,angle}=arrow;
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  if(glow>0.1){ctx.shadowBlur=18+glow*22;ctx.shadowColor='rgba(255,80,40,0.95)';}
  ctx.strokeStyle='#e53e3e'; ctx.lineWidth=2.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-24,0); ctx.lineTo(12,0); ctx.stroke();
  ctx.fillStyle='#ff7c20'; ctx.beginPath(); ctx.moveTo(12,0);ctx.lineTo(2,-5);ctx.lineTo(6,0);ctx.lineTo(2,5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#888'; ctx.beginPath(); ctx.moveTo(-24,0);ctx.lineTo(-16,-5);ctx.lineTo(-16,5);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawLockOn(target){
  if(!target) return;
  const t=Date.now()/1000, pulse=0.5+0.5*Math.sin(t*8);
  ctx.beginPath(); ctx.arc(target.x,target.y,target.r+10+pulse*4,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,80,40,${0.5+pulse*0.4})`; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(arrow.x,arrow.y); ctx.lineTo(target.x,target.y);
  ctx.strokeStyle=`rgba(255,80,40,${0.1+pulse*0.08})`; ctx.lineWidth=0.8; ctx.setLineDash([6,6]); ctx.stroke(); ctx.setLineDash([]);
  const br=target.r+14,bl=10;
  ctx.strokeStyle=`rgba(255,200,50,${0.7+pulse*0.3})`; ctx.lineWidth=2;
  for(const [sx,sy] of [[-1,-1],[1,-1],[1,1],[-1,1]]){
    const cx=target.x+sx*br,cy=target.y+sy*br;
    ctx.beginPath();ctx.moveTo(cx,cy-sy*bl);ctx.lineTo(cx,cy);ctx.lineTo(cx-sx*bl,cy);ctx.stroke();
  }
}

let lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTime)/16,3); lastTime=ts;
  if(dmgFlash>0) dmgFlash=Math.max(0,dmgFlash-0.04*dt);
  drawBG(); drawHomeZone(ts/1000);

  let target=null, isHigh=false;

  if(phase==='ready'&&listening){
    const hz=detectPitch(audioCtx.sampleRate) ;
    smoothHz=smoothHz*0.6+hz*0.4;

    const isLow  = hz > 0 && smoothHz > 60 && smoothHz <= MARK_HZ;
    isHigh       = hz > 0 && smoothHz > MARK_HZ;
    // 200~300 사이 or 무음 → 둥실

    // 음정 바 색상: 저음=파랑, 고음=빨강, 중간/무음=어둠
    const pitchPct = smoothHz>10 ? Math.min(100,(Math.log(smoothHz/60)/Math.log(1400/60))*100) : 0;
    document.getElementById('pitch-fill').style.height = pitchPct+'%';
    document.getElementById('pitch-fill').style.background = isHigh ? '#e53e3e' : isLow ? '#4a90d9' : '#444';
    document.getElementById('hz-display').textContent = smoothHz>10 ? Math.round(smoothHz)+' Hz' : '-- Hz';

    if(isHigh){
      target=getNearestEnemy();
      const speed = 10
      if(target){
        const dx=target.x-arrow.x,dy=target.y-arrow.y;
        const da=Math.atan2(dy,dx),ca=Math.atan2(arrow.vy,arrow.vx);
        let diff=da-ca; while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
        const na=ca+Math.sign(diff)*Math.min(Math.abs(diff),0.22*dt);
        arrow.vx=Math.cos(na)*speed; arrow.vy=Math.sin(na)*speed;
      }
      arrow.glow=Math.min(1,arrow.glow+0.12*dt);
      arrow.floatT=0;

    } else if(isLow){
      const h=HOME(),dx=h.x-arrow.x,dy=h.y-arrow.y,dist=Math.hypot(dx,dy);
      if(dist>8){
        const da=Math.atan2(dy,dx),ca=Math.atan2(arrow.vy,arrow.vx);
        let diff=da-ca; while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
        const na=ca+Math.sign(diff)*Math.min(Math.abs(diff),0.18*dt);
        arrow.vx=Math.cos(na)*Math.min(10,dist*0.11); arrow.vy=Math.sin(na)*Math.min(10,dist*0.11);
      } else { arrow.vx*=Math.pow(0.7,dt); arrow.vy*=Math.pow(0.7,dt); }
      arrow.glow=Math.max(0,arrow.glow-0.08*dt);
      arrow.floatT=0;

    } else {
      // 무음 or 중간음 → 둥실
      arrow.floatT+=dt*0.04;
      arrow.vx*=Math.pow(0.92,dt);
      arrow.vy*=Math.pow(0.92,dt);
      arrow.vy+=Math.sin(arrow.floatT)*0.06*dt;
      arrow.vx+=Math.cos(arrow.floatT*0.7)*0.03*dt;
      arrow.glow=Math.max(0,arrow.glow-0.05*dt);
    }

    arrow.x+=arrow.vx*dt; arrow.y+=arrow.vy*dt;
    arrow.x=Math.max(20,Math.min(W-20,arrow.x)); arrow.y=Math.max(20,Math.min(H-20,arrow.y));
    if(Math.hypot(arrow.vx,arrow.vy)>0.3) arrow.angle=Math.atan2(arrow.vy,arrow.vx);
    arrow.trail.push({x:arrow.x,y:arrow.y}); if(arrow.trail.length>40) arrow.trail.shift();

    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i]; if(e.hit) continue;
      if(Math.hypot(arrow.x-e.x,arrow.y-e.y)<e.r+10){
        e.hit=true; spawnParticles(e.x,e.y,e.color);
        kills++; score+=Math.round(80*(30/e.r));
        document.getElementById('score-box').textContent='점수: '+score;
        document.getElementById('kill-box').textContent='처치: '+kills;
      }
    }
  }

  const h=HOME();
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.hitCooldown>0) e.hitCooldown=Math.max(0,e.hitCooldown-0.04*dt);
    if(e.hit){ e.alpha-=0.05*dt; if(e.alpha<=0){enemies.splice(i,1);spawnEnemy();} else drawTarget(e); continue; }
    const dx=h.x-e.x,dy=h.y-e.y,dist=Math.hypot(dx,dy);
    e.x+=dx/dist*dt; e.y+=dy/dist*dt;
    if(dist<HOME_R+e.r&&e.hitCooldown===0&&phase==='ready'){
      hp=Math.max(0,hp-1); e.hitCooldown=1.0; dmgFlash=1; updateHPBar();
      if(hp<=0){
        phase='idle';
        document.getElementById('msg').innerHTML=`게임 오버<br><span style="font-size:22px">최종 점수: ${score}</span><br><span style="font-size:12px;opacity:0.7">버튼을 눌러 다시 시작</span>`;
        document.getElementById('msg').style.display='block';
        document.getElementById('mic-btn').textContent='다시 시작';
      }
    }
    drawTarget(e);
  }

  if(phase==='ready'&&isHigh) drawLockOn(target||getNearestEnemy());

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.08*dt; p.life-=0.03*dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=p.life; ctx.fill(); ctx.globalAlpha=1;
  }

  drawTrail();
  if(phase==='ready') drawArrow(arrow.glow);
}
requestAnimationFrame(loop);

document.getElementById('mic-btn').addEventListener('click', async ()=>{
  if(phase==='ready') return;
  hp=MAX_HP; score=0; kills=0; enemies.length=0; particles.length=0;
  spawnEnemy(); spawnEnemy();
  document.getElementById('score-box').textContent='점수: 0';
  document.getElementById('kill-box').textContent='처치: 0';
  updateHPBar();
  if(!listening){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true,echoCancellation:false,noiseSuppression:true  ,autoGainControl:true});
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      analyser=audioCtx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=0.4;
      timeDomainBuf=new Float32Array(analyser.fftSize);
      audioCtx.createMediaStreamSource(stream).connect(analyser);
      listening=true;
    }catch(e){
      document.getElementById('msg').innerHTML='마이크 접근 실패<br><span style="font-size:12px">브라우저 권한을 확인해주세요</span>';
      return;
    }
  }
  const hm=HOME(); arrow.x=hm.x; arrow.y=hm.y; arrow.vx=0; arrow.vy=-2; arrow.trail=[];
  phase='ready';
  document.getElementById('msg').style.display='none';
  document.getElementById('mic-btn').textContent='🎵 조종 중';
});

updateHPBar();

// ── MARK_HZ 슬라이더 동작 ──
(function(){
  const slider = document.getElementById('mark-hz-slider');
  const valEl  = document.getElementById('mark-hz-value');
  const fillEl = document.getElementById('mark-hz-fill');
  const MIN = +slider.min, MAX = +slider.max;

  function updateSlider(v) {
    MARK_HZ = v;
    valEl.textContent = v + ' Hz';
    const pct = (v - MIN) / (MAX - MIN) * 100;
    fillEl.style.width = pct + '%';
    const msgSpan = document.querySelector('#msg span');
    if (msgSpan) msgSpan.textContent =
      `~${Math.round(v * 0.27)}Hz 복귀 \u00a0|\u00a0 ${v}Hz↑ 호밍 \u00a0|\u00a0 무음 둥실`;
  }

  slider.addEventListener('input', () => updateSlider(+slider.value));
  updateSlider(+slider.value); // 초기값 반영
})();
</script>
